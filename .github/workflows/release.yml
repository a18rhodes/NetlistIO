name: Release

on:
  push:
    branches: [main]

# Only run one release at a time; cancel in-progress if a new commit lands.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create tags and GitHub releases
      id-token: write   # for trusted publishing (future PyPI use)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for semantic-release
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run CI checks before release
        run: poetry run pytest -x -q

      - name: Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: poetry run semantic-release publish
