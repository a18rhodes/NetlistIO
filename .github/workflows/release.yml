name: Release

on:
  push:
    branches: [main]

# Only run one release at a time; cancel-in-progress: false ensures a queued
# release is not silently dropped if another commit lands immediately after.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create tags and GitHub releases
      id-token: write   # for trusted publishing (future PyPI use)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for semantic-release
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Install PyTorch (CPU)
        run: |
          poetry run pip install torch --index-url https://download.pytorch.org/whl/cpu
          poetry run pip install torch_geometric

      - name: Lint (pylint)
        run: poetry run pylint netlistio tests --fail-under=10

      - name: Run unit and fixture tests
        run: poetry run pytest --cov=netlistio --cov-report=term-missing --cov-fail-under=100 -v

      - name: Fetch integration dataset
        run: bash scripts/setup_data.sh

      - name: Run integration tests
        run: poetry run pytest --integration -v

      - name: Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: poetry run semantic-release publish
