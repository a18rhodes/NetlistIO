name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    # Nightly integration run at 02:00 UTC — catches regressions against the
    # external SymBench dataset without blocking every push/PR.
    - cron: "0 2 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev

      - name: Format check (black)
        run: poetry run black --check . tests

      - name: Import order check (isort)
        run: poetry run isort --check-only . tests

      - name: Lint (pylint)
        run: poetry run pylint netlistio tests --fail-under=10

      - name: Run tests
        run: poetry run pytest --cov=netlistio --cov-report=xml --cov-report=term-missing --cov-fail-under=100 -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    # Run nightly (schedule) or on explicit pushes to main.
    # Never blocks a regular PR push.
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.11-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev

      - name: Fetch integration dataset
        run: bash scripts/setup_data.sh

      - name: Run integration tests
        run: poetry run pytest --integration -v
